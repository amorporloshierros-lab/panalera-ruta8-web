name: Keep Supabase awake

# Le pega a la base 2 veces por dia (08:00 y 20:00 hora Argentina)
# para que el plan gratis no la pause por inactividad.
on:
  schedule:
    - cron: '0 11,23 * * *'   # 11:00 y 23:00 UTC = 08:00 y 20:00 AR
  workflow_dispatch:           # permite dispararlo a mano desde la pestaña Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (ejecuta una consulta real)
        run: |
          echo "Ping a Supabase $(date -u)"
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://rgxnsmrldkrwpxhxiqkx.supabase.co/rest/v1/rpc/catalogo_web" \
            -H "apikey: sb_publishable_cearVxw4OJdpY1G6Xg7Zqw_YOruKla9" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "HTTP $code"
          # 200 = ok. Cualquier respuesta cuenta como actividad y evita la pausa.
          if [ "$code" != "200" ] && [ "$code" != "404" ]; then
            echo "Respuesta inesperada: $code"; fi
